services:
  - type: web
    name: cricai-backend
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --limit-concurrency 20
    envVars:
      - key: CRICAPI_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CRICAPI_DAILY_LIMIT
        value: "2000"
      - key: SECRET_KEY
        sync: false
